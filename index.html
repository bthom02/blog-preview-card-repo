<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

  </style>
</head>
<body>
  <a class="card-container" href="#">
    <img class="lesson-illustration-img" src="./assets/images/illustration-article.svg" alt="Illustration for the lesson image">

    <section class="content">
      <span class="category-tag">Learning</span>
      <p class="publish-date">Published 21 Dec 2023</p>
      <h1 class="lesson-title">HTML & CSS foundations</h1>
      <p class="lesson-desc">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </section>

    <section class="author-section">
      <img class="creator-avatar-img" src="./assets/images/image-avatar.webp" alt="Avatar picture of lesson cretor Greg Hooper">
      <p class="creator-name-text">Greg Hooper</p>
    </section>
  </a>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Blake Thompson</a>.
  </footer>
</body>
</html>
